      parameters:
        - name: month
          in: query
          required: false
          description: Restrict to a single month bucket (YYYY-MM, UTC). Omit for all-time totals.
          schema:
            type: string
      responses:
        "200":
          description: Per-user cost breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinanceUsersResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    FinanceServiceBreakdown:
      type: object
      required: [apifyUsd, openaiUsd, totalUsd]
      properties:
        apifyUsd:
          type: number
        openaiUsd:
          type: number
        totalUsd:
          type: number

    FinanceMonthEntry:
      type: object
      required: [month, apifyUsd, openaiUsd, platformUsd, totalUsd, estimated]
      properties:
        month:
          type: string
          description: Month bucket in YYYY-MM (UTC)
        apifyUsd:
          type: number
        openaiUsd:
          type: number
        platformUsd:
          type: number
          description: Platform subscription cost allocated to this month
        totalUsd:
          type: number
        estimated:
          type: boolean
          description: True if any cost in this month was reconstructed/estimated (backfilled)

    FinanceSummary:
      type: object
      required: [allTime, currentMonth, months, platformMonthlyUsd, platformNextPayment]
      properties:
        allTime:
          $ref: "#/components/schemas/FinanceServiceBreakdown"
        currentMonth:
          $ref: "#/components/schemas/FinanceMonthEntry"
        months:
          type: array
          items:
            $ref: "#/components/schemas/FinanceMonthEntry"
        platformMonthlyUsd:
          type: number
          description: Platform subscription cost per month (annual / 12)
        platformNextPayment:
          type: ["string", "null"]
          description: ISO date (YYYY-MM-DD) of the next Platform subscription payment

    FinanceUserCost:
      type: object
      required: [appUser, apifyUsd, openaiUsd, totalUsd, tokensInput, tokensOutput, events, estimated]
      properties:
        appUser:
          type: ["string", "null"]
          description: app_users.username, or null for platform/shared costs
        apifyUsd:
          type: number
        openaiUsd:
          type: number
        totalUsd:
          type: number
        tokensInput:
          type: integer
        tokensOutput:
          type: integer
        events:
          type: integer
        estimated:
          type: boolean
          description: True if any of this account's costs were reconstructed/estimated (backfilled)

    FinanceUsersResponse:
      type: object
      required: [users, month]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/FinanceUserCost"
        month:
          type: ["string", "null"]
          description: The month filter applied (YYYY-MM), or null for all-time

    Subreddit:
      type: object
      required: [id, subredditName, displayName, active, createdAt]
      properties:
        id:
          type: integer
        subredditName:
          type: string
        displayName:
          type: string
        description:
          type: ["string", "null"]
        active:
          type: boolean
        createdAt:
          type: string

    SubredditInput:
      type: object
      required: [subredditName, displayName]
      properties:
        subredditName:
          type: string
        displayName:
          type: string
        description:
          type: string

    SubredditUpdate:
      type: object
      properties:
        displayName:
          type: string
        description:
          type: string
        active:
          type: boolean

    AuthUser:
      type: object
      required: [username, role]
      properties:
        username:
          type: string
        role:
          type: string
          enum: [admin, member]

    AppAccount:
      type: object
      required: [username, role, createdAt]
      properties:
        username:
          type: string
        role:
          type: string
          enum: [admin, member]
        createdAt:
          type: string
        lastSeen:
          type: string
          nullable: true

    ListAccountsResponse:
      type: object
      required: [accounts]
      properties:
        accounts:
          type: array
          items:
            $ref: "#/components/schemas/AppAccount"

    CreateAccountBody:
      type: object
      required: [username, password, role]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
        role:
          type: string
          enum: [admin, member]

    UpdateAccountBody:
      type: object
      description: Fields to update on an account. Omit a field to leave it unchanged; password is only changed when a non-empty value is supplied.
      properties:
        password:
          type: string
          minLength: 1
        role:
          type: string
          enum: [admin, member]

    LoginAttempt:
      type: object
      required: [id, username, success, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        success:
          type: boolean
        ipAddress:
          type: ["string", "null"]
        createdAt:
          type: string

    LoginAttemptsResponse:
      type: object
      required: [attempts, total]
      properties:
        attempts:
          type: array
          items:
            $ref: "#/components/schemas/LoginAttempt"
        total:
          type: integer

    ApifyTestResult:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
