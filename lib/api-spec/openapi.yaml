        user:
          $ref: "#/components/schemas/TikTokUser"
        dominantArchetype:
          type: ["string", "null"]
        topScore:
          type: ["integer", "null"]
        analysisCount:
          type: integer

    TikTokUserListResponse:
      type: object
      required: [users, total]
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/TikTokUserWithScore"
        total:
          type: integer

    TikTokCommentSummary:
      type: object
      required: [id, body, likes, createdAt]
      properties:
        id:
          type: integer
        body:
          type: string
        likes:
          type: integer
        createdAt:
          type: string
        commentUrl:
          type: ["string", "null"]

    TikTokUserProfile:
      type: object
      required: [user, latestAnalysis, archetypeScores, recentComments]
      properties:
        user:
          $ref: "#/components/schemas/TikTokUser"
        latestAnalysis:
          $ref: "#/components/schemas/Analysis"
          nullable: true
        archetypeScores:
          type: array
          items:
            $ref: "#/components/schemas/ArchetypeScore"
        recentComments:
          type: array
          items:
            $ref: "#/components/schemas/TikTokCommentSummary"

    TikTokDashboardStats:
      type: object
      required: [totalUsers, totalPosts, totalComments, totalAnalyses, analyzedUsers, unanalyzedUsers, activeJobs, archetypeDistribution, activityByDay, topUsers]
      properties:
        totalUsers:
          type: integer
        totalPosts:
          type: integer
        totalComments:
          type: integer
        totalAnalyses:
          type: integer
        analyzedUsers:
          type: integer
        unanalyzedUsers:
          type: integer
        activeJobs:
          type: integer
        archetypeDistribution:
          type: array
          items:
            $ref: "#/components/schemas/ArchetypeDistributionItem"
        activityByDay:
          type: array
          items:
            $ref: "#/components/schemas/ActivityByDay"
        topUsers:
          type: array
          items:
            $ref: "#/components/schemas/TikTokUserWithScore"
        topThemes:
          type: array
          items:
            $ref: "#/components/schemas/ThemeCount"

    TikTokThemeDetailItem:
      type: object
      required: [username, displayName, description]
      properties:
        username:
          type: string
        displayName:
          type: string
        description:
          type: string

    TopicAnalysisInput:
      type: object
      required: [topicSummary, urls]
      properties:
        topicSummary:
          type: string
          description: Free-text description of the topic under investigation.
        urls:
          type: array
          description: Up to 20 Reddit post/thread URLs whose comments will be analysed.
          items:
            type: string
        themeHints:
          type: array
          description: >-
            Optional list of themes the analyst wants the AI to look for and
            prioritise when grouping comments (e.g. "housing", "cost of living").
            When omitted or empty, themes are chosen fully automatically.
          items:
            type: string
        themeCount:
          type: ["integer", "null"]
          description: >-
            Optional desired number of themes to group comments into (2-8). When
            omitted, the AI picks an appropriate number (3-5).
          minimum: 2
          maximum: 8

    IngestRunInput:
      type: object
      required: [url, runId]
      properties:
        url:
          type: string
          description: One of the analysis's input URLs to ingest (must not already have comments).
        runId:
          type: string
          description: The Apify actor-run ID whose dataset should be ingested for this URL.
      additionalProperties: false

    ReanalyzeTopicRequest:
      type: object
      properties:
        clearSteering:
          type: boolean
          description: When true, discard the run's stored theme hints and theme count and re-group fully automatically (zero credits, no re-crawl).
    TopicAnalysisSummary:
      type: object
      required: [id, topicSummary, status, inputUrls, postCount, commentCount, createdAt]
      properties:
        id:
          type: integer
        topicSummary:
          type: string
        status:
          type: string
          description: pending | running | completed | failed
        createdBy:
          type: ["string", "null"]
          description: Username of the account that created this analysis, or null for legacy rows.
        inputUrls:
          type: array
          items:
            type: string
        themeHints:
          type: array
          description: Theme hints the analyst supplied to steer this run (empty for automatic).
          items:
            type: string
        themeCount:
          type: ["integer", "null"]
          description: Desired number of themes the analyst requested, or null for automatic.
        postCount:
          type: integer
        commentCount:
          type: integer
        threadsTotal:
          type: integer
          description: Total threads to crawl for this run.
        threadsDone:
          type: integer
          description: Threads crawled so far (updated live while running).
        commentsGathered:
          type: integer
          description: Comments gathered so far (updated live while running).
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string
        completedAt:
          type: ["string", "null"]

    TopicAnalysisDetail:
      allOf:
        - $ref: "#/components/schemas/TopicAnalysisSummary"
        - type: object
          properties:
            result:
              oneOf:
                - $ref: "#/components/schemas/TopicAnalysisResult"
                - type: "null"
            posts:
              type: array
              items:
                $ref: "#/components/schemas/TopicAnalysisPost"
            gatheredComments:
              type: array
              items:
                $ref: "#/components/schemas/GatheredComment"

    TopicAnalysisPost:
      type: object
      required: [url, commentCount, score]
      properties:
        url:
          type: string
        title:
          type: ["string", "null"]
        commentCount:
          type: integer
        score:
          type: integer

    TopicAnalysisResult:
      type: object
      required: [executiveSummary, themes, flagged, otherComments]
      properties:
        executiveSummary:
          type: string
        themes:
          type: array
          items:
            $ref: "#/components/schemas/TopicTheme"
        flagged:
          type: array
          items:
            $ref: "#/components/schemas/FlaggedComment"
        otherComments:
          type: array
          items:
            $ref: "#/components/schemas/RepresentativeComment"

    TopicTheme:
      type: object
      required: [name, commentCount, percentage, summary, representativeComments, comments]
      properties:
        name:
          type: string
        commentCount:
          type: integer
        percentage:
          type: number
        summary:
          type: array
          items:
            type: string
        representativeComments:
          type: array
          items:
            $ref: "#/components/schemas/RepresentativeComment"
        comments:
          type: array
          items:
            $ref: "#/components/schemas/RepresentativeComment"

    RepresentativeComment:
      type: object
      required: [author, excerpt, permalink]
      properties:
        author:
          type: string
        excerpt:
          type: string
        permalink:
          type: string

    FlaggedComment:
      type: object
      required: [issue, excerpt, author, permalink]
      properties:
        issue:
          type: string
        excerpt:
          type: string
        author:
          type: string
        permalink:
          type: string

    GatheredComment:
      type: object
      required: [author, body, permalink, score]
      properties:
        author:
          type: string
        body:
          type: string
        permalink:
          type: string
        score:
          type: number
        commentKey:
          type: string
