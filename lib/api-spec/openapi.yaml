openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: App - Reddit Community Intelligence Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: dashboard
    description: Dashboard and stats
  - name: subreddits
    description: Subreddit management
  - name: users
    description: Reddit user profiles and analyses
  - name: archetypes
    description: Archetype classification explorer
  - name: jobs
    description: Background job management
  - name: search
    description: Search and filter
  - name: finance
    description: Cost tracking and finance reporting

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean

  /admin/accounts:
    get:
      operationId: listAccounts
      tags: [admin]
      summary: List all application accounts (admin only)
      responses:
        "200":
          description: List of accounts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListAccountsResponse"
        "403":
          description: Admin access required
    post:
      operationId: createAccount
      tags: [admin]
      summary: Create a new application account (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountBody"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                type: object
                required: [username, role]
                properties:
                  username:
                    type: string
                  role:
                    type: string
        "400":
          description: Invalid input
        "403":
          description: Admin access required
        "409":
          description: Username already exists

  /admin/accounts/{username}:
    patch:
      operationId: updateAccount
      tags: [admin]
      summary: Update an account's role and/or password (admin only)
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountBody"
      responses:
        "200":
          description: Account updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppAccount"
        "400":
          description: Invalid input or cannot demote the last admin
        "403":
          description: Admin access required
        "404":
          description: Account not found
    delete:
      operationId: deleteAccount
      tags: [admin]
      summary: Delete an application account (admin only)
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Account deleted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "400":
          description: Cannot delete (self or last admin)
        "403":
          description: Admin access required
        "404":
          description: Account not found

  /admin/login-attempts:
    get:
      operationId: listLoginAttempts
      tags: [admin]
      summary: Paginated list of login attempts (admin only)
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 5
      responses:
        "200":
          description: Paginated login attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginAttemptsResponse"
        "403":
          description: Admin access required

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard stats
      parameters:
        - name: subredditId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/theme-details:
    get:
      operationId: getDashboardThemeDetails
      tags: [dashboard]
      summary: Get elaborated descriptions for a given theme label
      parameters:
        - name: label
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Theme descriptions from individual user analyses
          content:
            application/json:
              schema:
                type: object
                required: [label, items]
                properties:
                  label:
                    type: string
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ThemeDetailItem"

  /facebook/dashboard/theme-details:
    get:
      operationId: getFacebookDashboardThemeDetails
      tags: [facebook]
      summary: Get elaborated descriptions for a given Facebook theme label
      parameters:
        - name: label
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Theme descriptions from individual Facebook profiles
          content:
            application/json:
              schema:
                type: object
                required: [label, items]
                properties:
                  label:
                    type: string
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FacebookThemeDetailItem"

  /subreddits:
    get:
      operationId: listSubreddits
      tags: [subreddits]
      summary: List all subreddits
      responses:
        "200":
          description: List of subreddits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subreddit"
    post:
      operationId: createSubreddit
      tags: [subreddits]
      summary: Add a new subreddit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubredditInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subreddit"
        "400":
          description: Bad request

  /subreddits/{id}:
    patch:
      operationId: updateSubreddit
      tags: [subreddits]
      summary: Update subreddit (e.g. activate/deactivate)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubredditUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subreddit"
        "404":
          description: Not found

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users with optional filters
      parameters:
        - name: subredditId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: q
          in: query
          required: false
          schema:
            type: ["string", "null"]
        - name: archetype
          in: query
          required: false
          schema:
            type: ["string", "null"]
        - name: minScore
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: sortBy
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /users/{username}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile with analyses and archetype scores
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: User not found

  /users/{username}/analyze:
    post:
      operationId: analyzeUser
      tags: [users]
      summary: Trigger AI analysis for a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Analysis queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: User not found

  /users/{username}/reanalyze:
    post:
      operationId: reanalyzeUser
      tags: [users]
      summary: Re-run AI analysis for a user using already-stored data (no crawl)
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "202":
          description: Re-analysis queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: User not found

  /users/{username}/trends:
    get:
      operationId: getUserTrends
      tags: [users]
      summary: Get archetype trend data over time for a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrendPoint"
        "404":
          description: User not found

  /users/{username}/notes:
    put:
      operationId: updateUserNotes
      tags: [users]
      summary: Save analyst notes for a user
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notes]
              properties:
                notes:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Notes saved
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "404":
          description: User not found

  /compare:
    get:
      operationId: compareUsers
      tags: [users]
      summary: Compare two users by archetype scores
      parameters:
        - name: u1
          in: query
          required: true
          schema:
            type: string
        - name: u2
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Comparison result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserComparison"
        "404":
          description: One or both users not found

  /archetypes:
    get:
      operationId: listArchetypes
      tags: [archetypes]
      summary: List all archetypes with stats
      parameters:
        - name: subredditId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Archetype stats list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArchetypeStat"

  /archetypes/{key}/users:
    get:
      operationId: getArchetypeUsers
      tags: [archetypes]
      summary: Get top users for a specific archetype
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: minScore
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Users with archetype scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserWithScore"

  /archetypes/derive:
    post:
      operationId: deriveArchetypes
      tags: [archetypes]
      summary: Regenerate the archetype taxonomy for a community in the background
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeriveArchetypesInput"
      responses:
        "202":
          description: Archetype derivation job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Bad request

  /search:
    get:
      operationId: searchUsers
      tags: [search]
      summary: Search users by username or archetype filters
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: ["string", "null"]
        - name: archetype
          in: query
          required: false
          schema:
            type: ["string", "null"]
        - name: minScore
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: minConfidence
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: subredditId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserWithScore"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List recent jobs (paginated)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: status
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Paginated job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListJobsResponse"

  /jobs/crawl:
    post:
      operationId: startCrawl
      tags: [jobs]
      summary: Start a subreddit crawl job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrawlInput"
      responses:
        "202":
          description: Crawl job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          description: Bad request

  /jobs/classify:
    post:
      operationId: resumeClassification
      tags: [jobs]
      summary: Resume classification of all unanalyzed users
      responses:
        "202":
          description: Classification started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeClassificationResponse"
        "200":
          description: Nothing to classify, or classification already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResumeClassificationResponse"

  /settings/apify:
    get:
      operationId: getApifySettings
      tags: [settings]
      summary: Get Apify integration settings
      responses:
        "200":
          description: Apify settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApifySettings"
    put:
      operationId: updateApifySettings
      tags: [settings]
      summary: Update Apify integration settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApifySettingsInput"
      responses:
        "200":
          description: Updated Apify settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApifySettings"

  /settings/apify/test:
    post:
      operationId: testApifyConnection
      tags: [settings]
      summary: Test Apify API token by calling /v2/users/me
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApifyTestResult"

  /jobs/{id}:
    delete:
      operationId: cancelJob
      tags: [jobs]
      summary: Cancel a pending job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Cancelled
        "404":
          description: Job not found

  /topic-analyses:
    get:
      operationId: listTopicAnalyses
      tags: [topic-analyses]
      summary: List past topic sentiment analyses
      responses:
        "200":
          description: Topic analysis list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopicAnalysisSummary"
    post:
      operationId: createTopicAnalysis
      tags: [topic-analyses]
      summary: Start a new topic sentiment analysis
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TopicAnalysisInput"
      responses:
        "202":
          description: Topic analysis started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicAnalysisSummary"
        "400":
          description: Bad request

  /topic-analyses/{id}:
    get:
      operationId: getTopicAnalysis
      tags: [topic-analyses]
      summary: Get a topic sentiment analysis with its full report
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Topic analysis detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicAnalysisDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteTopicAnalysis
      tags: [topic-analyses]
      summary: Delete a topic sentiment analysis and its per-post records
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /topic-analyses/{id}/reanalyze:
    post:
      operationId: reanalyzeTopicAnalysis
      tags: [topic-analyses]
      summary: Re-run AI grouping on a run's stored comments without re-crawling
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReanalyzeTopicRequest"
      responses:
        "202":
          description: Re-analysis started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicAnalysisSummary"
        "400":
          description: No stored comments to resume from
        "404":
          description: Not found
        "409":
          description: Already in progress

  /topic-analyses/{id}/crawl-missing:
    post:
      operationId: crawlMissingTopicAnalysis
      tags: [topic-analyses]
      summary: Crawl only the input URLs that were skipped, then merge and re-group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Crawl of skipped links started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicAnalysisSummary"
        "400":
          description: No skipped links to crawl
        "404":
          description: Not found
        "409":
          description: Already in progress

  /topic-analyses/{id}/ingest-run:
    post:
      operationId: ingestRunTopicAnalysis
      tags: [topic-analyses]
      summary: Re-ingest a single input URL from an existing (already-paid) Apify run
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRunInput"
      responses:
        "202":
          description: Ingest of the existing run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopicAnalysisSummary"
        "400":
          description: Invalid request, URL not in this analysis, URL already crawled, missing token, or invalid run
        "404":
          description: Not found
        "409":
          description: Already in progress

  /facebook/dashboard:
    get:
      operationId: getFacebookDashboard
      tags: [facebook]
      summary: Get Facebook dashboard stats
      responses:
        "200":
          description: Facebook dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacebookDashboardStats"

  /facebook/users:
    get:
      operationId: listFacebookUsers
      tags: [facebook]
      summary: List Facebook users with optional filters
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: ["string", "null"]
        - name: archetype
          in: query
          required: false
          schema:
            type: ["string", "null"]
        - name: minScore
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: offset
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: sortBy
          in: query
          required: false
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: List of Facebook users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacebookUserListResponse"

  /facebook/archetypes:
    get:
      operationId: listFacebookArchetypes
      tags: [facebook]
      summary: List all archetypes with Facebook population stats
      responses:
        "200":
          description: Archetype stats list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArchetypeStat"

  /facebook/archetypes/{key}/users:
    get:
      operationId: getFacebookArchetypeUsers
      tags: [facebook]
      summary: Get top Facebook users for a specific archetype
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: minScore
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Facebook users with archetype scores
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FacebookUserWithScore"

  /facebook/search:
    get:
      operationId: searchFacebookUsers
      tags: [facebook]
      summary: Search Facebook users by name or archetype filters
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: ["string", "null"]
        - name: archetype
          in: query
          required: false
          schema:
            type: ["string", "null"]
        - name: minScore
          in: query
          required: false
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FacebookUserWithScore"

  /facebook/users/{profileId}:
    get:
      operationId: getFacebookUser
      tags: [facebook]
      summary: Get a single Facebook user profile with analysis
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Facebook user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FacebookUserProfile"
        "404":
          description: User not found

  /facebook/classify:
    post:
      operationId: resumeFacebookClassification
      tags: [facebook]
