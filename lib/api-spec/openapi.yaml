    Job:
      type: object
      required: [id, jobType, status, createdAt]
      properties:
        id:
          type: integer
        source:
          type: string
          enum: [job, sentiment]
          description: >-
            Where this row originates: "job" = background jobs table (crawls,
            classification batches); "sentiment" = a topic sentiment analysis
            report run. Ids are only unique within a source.
        jobType:
          type: string
        title:
          type: ["string", "null"]
          description: >-
            Human-readable subject for the row (e.g. the topic summary for a
            sentiment report). Null for rows with no distinct subject.
        status:
          type: string
        subredditId:
          type: ["integer", "null"]
        subredditName:
          type: ["string", "null"]
        targetUsername:
          type: ["string", "null"]
        postUrl:
          type: ["string", "null"]
        progress:
          type: ["integer", "null"]
        total:
          type: ["integer", "null"]
        errorMessage:
          type: ["string", "null"]
        createdAt:
          type: string
        completedAt:
          type: ["string", "null"]
        launchedBy:
          type: ["string", "null"]
          description: >-
            Username of the account that launched this job/report, when known.
            Null for system-initiated work or historical rows created before
            attribution was tracked.

    CrawlInput:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [posts, comments, both, user]
          description: >-
            posts = posts only from a subreddit; both = posts and their comments
            from a subreddit; comments = comments from a single specific Reddit
            post URL (requires postUrl, not a subreddit); user = a single Reddit
            user's full post/comment history via the free Arctic Shift archive
            (requires username), including content since deleted on live Reddit.
        subreddit:
          type: string
          description: >-
            Target subreddit name (without the r/ prefix) for mode=posts and
            mode=both. The subreddit is found-or-created automatically, so it does
            not need to be pre-registered. Ignored for mode=comments.
        subredditId:
          type: integer
          description: >-
            Optional legacy alternative to `subreddit` for mode=posts/both — the
            id of an already-tracked subreddit. Ignored for mode=comments.
        postLimit:
          type: integer
          description: Max posts to fetch for mode=posts/both. Defaults to 50.
        postUrl:
          type: string
          description: Required for mode=comments. A full Reddit post/thread URL.
        username:
          type: string
          description: >-
            Required for mode=user. The Reddit username to investigate (with or
            without a u/ prefix); their history is fetched from Arctic Shift.
        contentType:
          type: string
          enum: [posts, comments, both]
          description: >-
            For mode=user: which of the user's content to fetch. Defaults to both.
        maxItems:
          type: integer
          description: >-
            For mode=user: hard cap on items fetched per content type (1–5000).
            Defaults to 1000.
        refresh:
          type: string
          enum: [incremental, full]
          description: >-
            For mode=user: incremental (default) only fetches content newer than
            what's already stored for this user; full re-walks the entire history
            (deduped by Reddit id either way).

